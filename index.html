var PY_SRC = `
import ezdxf, re, json, math

def clean_mtext(raw):
    text = raw.replace(chr(92)+"P", " ").replace("^J", " ")
    text = re.sub(r"\\\\[fFCcWwHhAaQqLlOoKkTt][^;]*;", "", text)
    text = re.sub(r"\\\\p[^;]*;", "", text)
    text = text.replace("{", "").replace("}", "").replace(chr(92), "")
    return re.sub(r"\\s+", " ", text).strip()

def extract_texts(doc, bn=None, tr=(0,0), d=0):
    r = []
    ents = doc.blocks.get(bn) if bn else doc.modelspace()
    if ents is None: return r
    for e in ents:
        if e.dxftype() == "TEXT":
            r.append({"text": e.dxf.text.strip(), "x": e.dxf.insert.x+tr[0], "y": e.dxf.insert.y+tr[1]})
        elif e.dxftype() == "MTEXT":
            r.append({"text": clean_mtext(e.text), "x": e.dxf.insert.x+tr[0], "y": e.dxf.insert.y+tr[1]})
        elif e.dxftype() == "INSERT" and d < 5:
            r.extend(extract_texts(doc, e.dxf.name, (e.dxf.insert.x+tr[0], e.dxf.insert.y+tr[1]), d+1))
    return r

def extract_walls(doc, bn=None, tr=(0,0), d=0):
    walls = []
    ents = doc.blocks.get(bn) if bn else doc.modelspace()
    if ents is None: return walls
    for e in ents:
        if e.dxftype() == "LINE" and e.dxf.layer in ("Han-Wal", "0"):
            x1, y1 = e.dxf.start.x+tr[0], e.dxf.start.y+tr[1]
            x2, y2 = e.dxf.end.x+tr[0], e.dxf.end.y+tr[1]
            if math.sqrt((x2-x1)**2+(y2-y1)**2) > 1000:
                walls.append(((x1,y1),(x2,y2)))
        elif e.dxftype() == "LWPOLYLINE" and e.dxf.layer in ("Han-Wal", "0"):
            pts = [(p[0]+tr[0], p[1]+tr[1]) for p in e.get_points(format="xy")]
            for i in range(len(pts)-1):
                x1,y1 = pts[i]; x2,y2 = pts[i+1]
                if math.sqrt((x2-x1)**2+(y2-y1)**2) > 1000:
                    walls.append(((x1,y1),(x2,y2)))
        elif e.dxftype() == "INSERT" and d < 5:
            walls.extend(extract_walls(doc, e.dxf.name, (e.dxf.insert.x+tr[0], e.dxf.insert.y+tr[1]), d+1))
    return walls

def pt_to_seg(px, py, x1, y1, x2, y2):
    dx, dy = x2-x1, y2-y1
    if dx==0 and dy==0: return math.sqrt((px-x1)**2+(py-y1)**2), x1, y1
    t = max(0, min(1, ((px-x1)*dx+(py-y1)*dy)/(dx*dx+dy*dy)))
    qx, qy = x1+t*dx, y1+t*dy
    return math.sqrt((px-qx)**2+(py-qy)**2), qx, qy

def nearest_wall(px, py, walls, max_d=3000):
    best = (float("inf"), px, py, "H")
    for (x1,y1),(x2,y2) in walls:
        d, qx, qy = pt_to_seg(px, py, x1, y1, x2, y2)
        orient = "H" if abs(x2-x1) > abs(y2-y1) else "V"
        if d < best[0] and d < max_d:
            best = (d, qx, qy, orient)
    return best

EQ_DB = [
    ("음료 쇼케이스","음료쇼케이스","WP",0.5,2000,""),
    ("상부 그리들","가스낮은그리들","WP",0,600,"랜선"),
    ("서랍식냉장고","낮은서랍식냉장고","WP",0.6,600,"랜선"),
    ("슬라이딩 온장고","서랍식온장고","WP",1.5,600,"단독"),
    ("테이블온장고","테이블온장고","WP",0.6,600,""),
    ("토핑냉장고","김밥테이블냉장고","WP",0.4,600,""),
    ("수비드","수비드머신","WP",2.0,600,"단독"),
    ("식세기","식기세척기","WP",3.8,1500,"단독직결"),
    ("3구렌지","3구렌지","WP",0,1200,""),
    ("튀김기","가스튀김기","WP",0.4,600,""),
    ("45BOX","45박스","WP",1.2,2000,""),
    ("쇼케이스","음료쇼케이스","WP",0.5,2000,""),
    ("제빙기","제빙기","WP",1.2,600,"맥주+제빙기"),
    ("그리들","가스그리들","WP",0,600,""),
    ("정수기","정수기","NOR",0,"장내부",""),
    ("온수기장","가스온수기","NOR",0,"높이맞춤",""),
    ("온수기","가스온수기","NOR",0,"높이맞춤",""),
    ("키오스크","키오스크","NOR",0,"장내부","랜선"),
    ("POS","POS","NOR",0,"장내부","랜선"),
    ("충전","충전돼지","NOR",0,1200,""),
]

def match_equipment(texts):
    matched = []
    used = set()
    for t in texts:
        for kw, name, ctype, kwv, h, note in EQ_DB:
            k = (round(t["x"]/50), round(t["y"]/50))
            if kw in t["text"] and k not in used:
                used.add(k)
                matched.append({"name":name,"type":ctype,"kw":kwv,"h":h,"note":note,"x":t["x"],"y":t["y"]})
                break
    return matched

_doc = None
_equip = None
_walls = None

def process_dxf_file():
    global _doc, _equip, _walls
    _doc = ezdxf.readfile("/tmp/input.dxf")
    texts = extract_texts(_doc)
    _walls = extract_walls(_doc)
    _equip = match_equipment(texts)
    return json.dumps({
        "texts":[{"text":t["text"],"x":float(t["x"]),"y":float(t["y"])} for t in texts],
        "equip":[{"name":e["name"],"type":e["type"],"kw":float(e["kw"]),"h":str(e["h"]),"note":e["note"],"x":float(e["x"]),"y":float(e["y"])} for e in _equip],
        "walls":len(_walls)
    })

def generate_power():
    global _doc, _equip, _walls
    msp = _doc.modelspace()
    deleted = 0

    # ★1. 위계 처리
    # (a) 21개 레이어 OFF
    OFF_LAYERS = {
        "S-DIM","★NS_dim","LIGHT","C-LIGHT","OJ-CH-LIGHT","★NS_wall",
        ".","실명","SHEET","FUR-1","F-CLOUD","I-F-TXT",
        "주방기구","2D","IN-FUR","I-FUR","F-fur-2","F4","P",
        "text","TEX"
    }
    for layer in _doc.layers:
        if layer.dxf.name in OFF_LAYERS:
            layer.off()
        elif layer.dxf.name != "Defpoints":
            layer.dxf.color = 252
    # (b) 블록 내부 전체 color=252
    for block in _doc.blocks:
        if block.name.startswith("*"): continue
        for e in block:
            try: e.dxf.color = 252
            except: pass
    # (c) 모델스페이스 color=252
    for e in msp:
        try: e.dxf.color = 252
        except: pass
    # (d) RMFHEHUSDUFUEEEEEFE 블록 정리
    try:
        blk_rmf = _doc.blocks.get("RMFHEHUSDUFUEEEEEFE")
        if blk_rmf:
            rmf_del = [e for e in blk_rmf if e.dxftype() in ("MULTILEADER","LEADER","DIMENSION","WIPEOUT")]
            for e in rmf_del:
                try: blk_rmf.delete_entity(e)
                except: pass
    except: pass
    # (e) rheuwrhgwuer 블록 정리 (사람/치수/번호)
    try:
        blk_rh = _doc.blocks.get("rheuwrhgwuer")
        if blk_rh:
            PERSON_BLOCKS = {"QKrtptel","TPFVMQK","550","550111r","RMRMNT"}
            rh_del = []
            for e in blk_rh:
                try:
                    if e.dxftype() == "INSERT" and e.dxf.name in PERSON_BLOCKS: rh_del.append(e)
                    elif e.dxftype() == "DIMENSION": rh_del.append(e)
                    elif e.dxf.layer == "SHEET": rh_del.append(e)
                except: pass
            for e in rh_del:
                try: blk_rh.delete_entity(e)
                except: pass
    except: pass

    # ★2. 범례표 영역 기존 엔티티 삭제 (x>19000, y<7000)
    to_del = []
    for e in msp:
        ex = ey = None
        if hasattr(e.dxf, "insert"):
            ex, ey = e.dxf.insert.x, e.dxf.insert.y
        elif hasattr(e.dxf, "center"):
            ex, ey = e.dxf.center.x, e.dxf.center.y
        elif hasattr(e.dxf, "start"):
            ex, ey = e.dxf.start.x, e.dxf.start.y
        if ex is not None and ex > 19000 and ey < 7000:
            to_del.append(e)
        if e.dxftype() in ("TEXT", "MTEXT"):
            txt = e.dxf.text if e.dxftype() == "TEXT" else (e.text or "")
            if any(kw in txt for kw in ["좌석", "바테이블", "2인 테이블"]):
                to_del.append(e)
            if ex is not None and ex < 5000 and ey < 5000:
                if any(kw in txt for kw in ["평 :", "면적"]):
                    to_del.append(e)

    for e in set(to_del):
        try:
            msp.delete_entity(e)
            deleted += 1
        except:
            pass

    if "OJ-CH-TEXT" not in [l.dxf.name for l in _doc.layers]:
        _doc.layers.add("OJ-CH-TEXT", color=7)

    wp_c = 0
    lan_c = 0

    for eq in _equip:
        if eq["type"] not in ("WP","NOR"): continue
        dist, wx, wy, orient = nearest_wall(eq["x"], eq["y"], _walls)
        c = 30 if eq["type"]=="WP" else 5

        if eq["type"] == "WP":
            if orient == "H":
                sx, sy = (1.57, 1.57) if wy < eq["y"] else (-1.57, 1.57)
                rot = 180.0 if wy < eq["y"] else 0.0
            else:
                sx, sy = (-1.57, 1.57) if wx > eq["x"] else (1.57, 1.57)
                rot = 270.0 if wx > eq["x"] else 90.0
            try:
                msp.add_blockref("A$C1b8849f8", (wx, wy), dxfattribs={
                    "layer": "0", "color": c, "xscale": sx, "yscale": sy, "rotation": rot})
            except:
                msp.add_circle((wx,wy),120,dxfattribs={"layer":"0","color":c})
            if orient == "H":
                wpy = wy + (32 if wy < eq["y"] else -32)
                msp.add_mtext("WP",dxfattribs={"layer":"0","char_height":80,"color":c,"insert":(wx-19,wpy)})
            else:
                wpx = wx + (32 if wx > eq["x"] else -32)
                msp.add_mtext("WP",dxfattribs={"layer":"0","char_height":80,"color":c,"insert":(wpx,wy-19)})
            wp_c += 1
        else:
            msp.add_circle((wx,wy),110,dxfattribs={"layer":"0","color":c})
            msp.add_circle((wx-25,wy+15),15,dxfattribs={"layer":"0","color":c})
            msp.add_circle((wx+25,wy+15),15,dxfattribs={"layer":"0","color":c})
            msp.add_line((wx-55,wy+110),(wx+55,wy+110),dxfattribs={"layer":"0","color":c})

        if eq["note"] and "랜선" in str(eq["note"]):
            lx = wx + (200 if orient=="H" else 0)
            ly = wy + (0 if orient=="H" else 200)
            msp.add_circle((lx,ly),110,dxfattribs={"layer":"0","color":3})
            msp.add_text("L",dxfattribs={"layer":"0","color":3,"height":100,"insert":(lx-35,ly-45)})
            lan_c += 1

    # SW
    sw_walls = [w for w in _walls if abs(w[0][0]-w[1][0]) < 100]
    if sw_walls:
        sw_wall = min(sw_walls, key=lambda w: w[0][0])
        sw_x = sw_wall[0][0]
        sw_y = (sw_wall[0][1] + sw_wall[1][1]) / 2
        msp.add_circle((sw_x, sw_y-500), 110, dxfattribs={"layer":"0","color":5})
        msp.add_text("S.W",dxfattribs={"layer":"0","color":5,"height":65,"insert":(sw_x-60,sw_y-525)})

    # 범례표
    lx2,ly0=20300,5700
    msp.add_text("SYMBOL",dxfattribs={"layer":"0","height":120,"color":7,"insert":(lx2,ly0)})
    msp.add_text("DESCRIPTION",dxfattribs={"layer":"0","height":120,"color":7,"insert":(lx2+1500,ly0)})
    msp.add_text("Q\\x27TY",dxfattribs={"layer":"0","height":120,"color":7,"insert":(lx2+3900,ly0)})
    msp.add_line((lx2-200,ly0-50),(lx2+4500,ly0-50),dxfattribs={"layer":"0","color":7})
    legend=[("2구 콘센트","2EA",30),("2구 방우형 콘센트",f"{wp_c}EA",30),("4구 콘센트","2EA",30),
            ("2구 콘센트 (스텐)","6EA",5),("전등(디밍기) 스위치 (스텐)","1EA",5),
            ("LAN선",f"{max(lan_c,4)}EA",3),("집결지","1EA",3)]
    ly=ly0-400
    for desc,qty,lc in legend:
        msp.add_circle((lx2+100,ly),110,dxfattribs={"layer":"0","color":lc})
        msp.add_mtext(desc,dxfattribs={"layer":"0","char_height":90,"color":7,"insert":(lx2+700,ly+50)})
        msp.add_mtext(qty,dxfattribs={"layer":"0","char_height":90,"color":7,"insert":(lx2+3900,ly+50)})
        msp.add_line((lx2-200,ly-170),(lx2+4500,ly-170),dxfattribs={"layer":"0","color":9})
        ly-=400

    msp.add_mtext("* 구조적인 현장 상황에 따라 콘센트 위치를 *\\\\P유동적으로 적용할 수 있습니다.\\\\P* 높이 값 참고 사항 *",
        dxfattribs={"layer":"0","char_height":80,"color":1,"insert":(13000,15500)})

    _doc.saveas("/tmp/output.dxf")
    return wp_c, lan_c, deleted
`;

async function initPy(){
  try{

async function hFile(file){
  if(!file.name.endsWith('.dxf')){log('DXF만 지원','er');return}
  document.getElementById('lg').innerHTML='';
  log('파일: '+file.name+' ('+(file.size/1024).toFixed(0)+'KB)');
  dz.classList.add('ok');dz.querySelector('h3').textContent=file.name;dz.querySelector('p').textContent=(file.size/1024).toFixed(0)+'KB';
  var ab=await file.arrayBuffer();
  py.FS.writeFile('/tmp/input.dxf', new Uint8Array(ab));
  log('ezdxf 파싱 중 (블록 재귀 + 벽체 탐색)...');
  try{
    var resStr=await py.runPythonAsync('process_dxf_file()');
    var d=JSON.parse(resStr);AT=d.texts;ME=d.equip;
    var wc=ME.filter(function(e){return e.type==='WP'}).length;
    var nc=ME.filter(function(e){return e.type==='NOR'}).length;
    var lc=ME.filter(function(e){return e.note&&e.note.indexOf('랜선')>=0}).length;
    log('텍스트 '+AT.length+'개 / 장비 '+ME.length+'종 / 벽체 '+d.walls+'개','ok');
    log('WP:'+wc+' 일반:'+nc+' LAN:'+lc);
    document.getElementById('iS').style.display='block';
    document.getElementById('sT').textContent=AT.length;
    document.getElementById('sE').textContent=ME.length+'종';
    document.getElementById('sW').textContent=wc+'EA';
    document.getElementById('sN').textContent=nc+'EA';
    document.getElementById('sL').textContent=lc+'EA';
    document.getElementById('eS').style.display='block';
    document.getElementById('eL').innerHTML=ME.map(function(e){
      var b=e.type==='WP'?'<span class="bg bg-w">WP</span>':e.type==='NOR'?'<span class="bg bg-n">일반</span>':'';
      var l=e.note&&e.note.indexOf('랜선')>=0?' <span class="bg bg-l">LAN</span>':'';
      return '<div class="ei"><span>'+e.name+'</span><span>'+b+l+(e.kw?' '+e.kw+'kw':'')+'</span></div>';
    }).join('');
    document.getElementById('gB').disabled=false;
    renderSVG(0);
  }catch(e){log('파싱 오류: '+e.message,'er');console.error(e)}
}

async function generate(){
  log('');log('=== 전기도면 DXF 생성 ===','inf');
  log('1. 위계처리 (레이어OFF + color=252)');
  log('2. 범례표/좌석수 삭제 + 치수선 OFF');
  log('3. 벽면 투영 + A$C1b8849f8 블록');

    var resStr=await py.runPythonAsync('_wc,_lc,_del=generate_power()\njson.dumps({"wp":_wc,"lan":_lc,"del":_del})');

function dlDXF(){
  if(!rBytes)return;
  var b=new Blob([rBytes],{type:'application/octet-stream'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='POWER_PLAN_AUTO.dxf';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  log('DXF 다운로드 완료','ok');
}

function renderSVG(tab){
  var sv=document.getElementById('sv');sv.style.display='block';document.getElementById('emp').style.display='none';
  var x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;
  for(var i=0;i<AT.length;i++){var t=AT[i];if(t.x<x1)x1=t.x;if(t.x>x2)x2=t.x;if(t.y<y1)y1=t.y;if(t.y>y2)y2=t.y}
  if(x1>=x2){x1=0;y1=0;x2=1000;y2=800}
  var p=3000;VB={x:x1-p,y:-(y2+p),w:(x2-x1)+p*2,h:(y2-y1)+p*2};
  sv.setAttribute('viewBox',VB.x+' '+VB.y+' '+VB.w+' '+VB.h);
  var h='',op=tab===0?1:0.25;
  h+='<g opacity="'+op+'">';
  for(var i=0;i<AT.length;i++){var t=AT[i];h+='<text x="'+t.x+'" y="'+(-t.y)+'" fill="#aaa" font-size="'+(t.text.length>20?60:80)+'" font-family="sans-serif">'+t.text.substring(0,30)+'</text>'}
  h+='</g>';
  if(tab===0){for(var i=0;i<ME.length;i++){var e=ME[i];h+='<circle cx="'+e.x+'" cy="'+(-e.y)+'" r="200" fill="rgba(212,146,42,.25)" stroke="#d4922a" stroke-width="8"/><text x="'+e.x+'" y="'+(-e.y+60)+'" fill="#d4922a" font-size="100" text-anchor="middle" font-weight="600" font-family="sans-serif">'+e.name.substring(0,5)+'</text>'}}
  if(tab===1){for(var i=0;i<ME.length;i++){var e=ME[i];if(e.type!=='WP'&&e.type!=='NOR')continue;var c=e.type==='WP'?'#ED7D31':'#5B9BD5';h+='<circle cx="'+e.x+'" cy="'+(-e.y)+'" r="160" fill="'+c+'" opacity=".85"/>';if(e.type==='WP')h+='<circle cx="'+e.x+'" cy="'+(-e.y)+'" r="100" fill="none" stroke="#fff" stroke-width="8"/><text x="'+e.x+'" y="'+(-e.y+200)+'" fill="'+c+'" font-size="110" text-anchor="middle" font-weight="700" font-family="sans-serif">WP</text>';h+='<circle cx="'+(e.x-40)+'" cy="'+(-e.y+15)+'" r="22" fill="#fff"/><circle cx="'+(e.x+40)+'" cy="'+(-e.y+15)+'" r="22" fill="#fff"/>';if(e.note&&e.note.indexOf('랜선')>=0)h+='<circle cx="'+(e.x+280)+'" cy="'+(-e.y)+'" r="130" fill="none" stroke="#70AD47" stroke-width="8"/><text x="'+(e.x+280)+'" y="'+(-e.y+40)+'" fill="#70AD47" font-size="90" text-anchor="middle" font-weight="700" font-family="sans-serif">L</text>';h+='<text x="'+e.x+'" y="'+(-e.y-220)+'" fill="'+c+'" font-size="80" text-anchor="middle" font-family="sans-serif">'+e.name+'</text>'}}
  sv.innerHTML=h;
}
function stab(n){CT=n;document.querySelectorAll('.tb').forEach(function(t,i){t.classList.toggle('ac',i===n)});if(AT.length)renderSVG(n)}

var vw=document.getElementById('vw'),svE=document.getElementById('sv');
vw.addEventListener('wheel',function(e){e.preventDefault();var s=e.deltaY>0?1.1:0.9;var r=svE.getBoundingClientRect();var mx=(e.clientX-r.left)/r.width,my=(e.clientY-r.top)/r.height;var nw=VB.w*s,nh=VB.h*s;VB.x+=(VB.w-nw)*mx;VB.y+=(VB.h-nh)*my;VB.w=nw;VB.h=nh;svE.setAttribute('viewBox',VB.x+' '+VB.y+' '+VB.w+' '+VB.h)});
vw.addEventListener('mousedown',function(e){DG=true;DS={x:e.clientX,y:e.clientY}});

vw.addEventListener('mouseup',function(){DG=false});
vw.addEventListener('mouseleave',function(){DG=false});
</script>
