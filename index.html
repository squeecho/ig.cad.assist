<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TacoBooth — 전기도면 자동생성</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#141418;--bg2:#1c1c24;--bg3:#24242e;--text:#e8e8e8;--text2:#999;--text3:#666;--border:#333;--accent:#d4922a;--accent2:#b07820;--red:#e24b4a;--green:#5dca7a;--blue:#5b9bd5;--font:'Pretendard Variable','Pretendard',-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;height:100vh;overflow:hidden}
.sb{width:300px;min-width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sb-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.up{margin:16px;border:2px dashed var(--border);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s}
.up:hover,.up.dg{border-color:var(--accent);background:rgba(212,146,42,.05)}
.up.ok{border-color:var(--green);border-style:solid}
.up h3{font-size:13px;font-weight:500;margin-bottom:4px}.up p{font-size:11px;color:var(--text3)}
.sec{margin:0 16px 10px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)}
.sec-t{padding:10px 14px;font-size:12px;font-weight:500;color:var(--text2)}
.sec-b{padding:0 14px 10px}
.sr{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.sr span:first-child{color:var(--text2)}.sr span:last-child{font-weight:500}
.btn{width:calc(100% - 32px);padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);margin:0 16px 8px}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accent2)}.bp:disabled{opacity:.4;cursor:not-allowed}
.bd{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.bd:hover{background:var(--border)}
.el{max-height:160px;overflow-y:auto}
.ei{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,.04)}
.bg{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600}
.bg-w{background:rgba(237,125,49,.15);color:#ED7D31}.bg-l{background:rgba(112,173,71,.15);color:#70AD47}.bg-n{background:rgba(91,155,213,.15);color:#5B9BD5}
.la{margin:0 16px 16px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);flex:1;min-height:60px;overflow:hidden;display:flex;flex-direction:column}
.la-t{padding:8px 14px;font-size:12px;font-weight:500;color:var(--text2)}
.la-c{padding:0 14px 8px;font-size:11px;color:var(--text3);font-family:'SF Mono',monospace;overflow-y:auto;flex:1;line-height:1.6}
.la-c .ok{color:var(--green)}.la-c .er{color:var(--red)}.la-c .inf{color:var(--blue)}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tbs{display:flex;padding:12px 20px 0;gap:4px;border-bottom:1px solid var(--border)}
.tb{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none}
.tb:hover{color:var(--text2)}.tb.ac{color:var(--accent);background:var(--bg2);border-color:var(--border)}
.vw{flex:1;position:relative;overflow:hidden;background:var(--bg2)}
.vw svg{width:100%;height:100%}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:8px;font-size:13px}
#fi{display:none}
#tip{position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);pointer-events:none;display:none;z-index:100;max-width:240px;line-height:1.5}
</style>
</head>
<body>
<div class="sb">
<div class="sb-hd"><div class="logo">TB</div><div><div style="font-size:15px;font-weight:600">TacoBooth 전기도면</div><div style="font-size:11px;color:var(--text2);margin-top:1px">평면도 DXF → POWER PLAN DXF</div></div></div>
<div class="up" id="dz" onclick="document.getElementById('fi').click()"><div style="font-size:28px;opacity:.4;margin-bottom:6px">△</div><h3>배치도 DXF 업로드</h3><p>AutoCAD 2018 DXF</p></div>
<input type="file" id="fi" accept=".dxf">
<div class="sec" id="iS" style="display:none"><div class="sec-t">◎ 파싱 결과</div><div class="sec-b"><div class="sr"><span>총 텍스트</span><span id="sT">-</span></div><div class="sr"><span>장비 인식</span><span id="sE" style="color:var(--green)">-</span></div><div class="sr"><span>WP 콘센트</span><span id="sW" style="color:#ED7D31">-</span></div><div class="sr"><span>일반 콘센트</span><span id="sN">-</span></div><div class="sr"><span>LAN</span><span id="sL" style="color:#70AD47">-</span></div></div></div>
<div class="sec" id="eS" style="display:none"><div class="sec-t">◎ 인식된 장비</div><div class="sec-b el" id="eL"></div></div>
<button class="btn bp" id="gB" disabled onclick="gen()">▶ 전기도면 생성</button>
<button class="btn bd" id="dB" style="display:none" onclick="dlDXF()">↓ DXF 다운로드</button>
<button class="btn bd" id="jB" style="display:none" onclick="dlJSON()">↓ JSON 데이터</button>
<div class="la"><div class="la-t">■ 로그</div><div class="la-c" id="lg">파일을 불러오면 시작합니다...</div></div>
</div>
<div class="mn">
<div class="tbs"><div class="tb ac" onclick="stab(0)">원본</div><div class="tb" onclick="stab(1)">전기</div></div>
<div class="vw" id="vw"><div class="es" id="emp"><div style="font-size:36px;opacity:.2">△</div>DXF 파일을 불러와주세요</div><svg id="sv" style="display:none" xmlns="http://www.w3.org/2000/svg"></svg></div>
<div id="tip"></div>
</div>
<script>
const DB=[["음료 쇼케이스","음료쇼케이스","WP",0.5,2000,""],["상부 그리들","가스낮은그리들","WP",0,600,"랜선"],["서랍식냉장고","낮은서랍식냉장고","WP",0.6,600,"랜선"],["슬라이딩 온장고","서랍식온장고","WP",1.5,600,"단독"],["테이블온장고","테이블온장고","WP",0.6,600,""],["토핑냉장고","김밥테이블냉장고","WP",0.4,600,""],["수비드","수비드머신","WP",2.0,600,"단독"],["식세기","식기세척기","WP",3.8,1500,"단독직결"],["3구렌지","3구렌지","WP",0,1200,""],["튀김기","가스튀김기","WP",0.4,600,""],["45BOX","45박스","WP",1.2,2000,""],["쇼케이스","음료쇼케이스","WP",0.5,2000,""],["배기후드","배기후드","X",0,0,""],["제빙기","제빙기","WP",1.2,600,"맥주+제빙기"],["그리들","가스그리들","WP",0,600,""],["워터릴","워터릴","X",0,0,""],["정수기","정수기","NOR",0,"장내부",""],["온수기장","가스온수기","NOR",0,"높이맞춤",""],["온수기","가스온수기","NOR",0,"높이맞춤",""],["키오스크","키오스크","NOR",0,"장내부","랜선"],["POS","POS","NOR",0,"장내부","랜선"],["충전","충전돼지","NOR",0,1200,""],["카운터","배식대/카운터다이","X",0,0,""],["셀프바","셀프바/세면대","X",0,0,""],["배달선반","배달선반장","X",0,0,""]];
let AT=[],ME=[],CT=0,DR='',VB={x:0,y:0,w:1e3,h:800},DG=false,DS={x:0,y:0};
function L(m,c=''){const e=document.getElementById('lg');e.innerHTML+=`<div${c?' class="'+c+'"':''}>${m}</div>`;e.scrollTop=e.scrollHeight}

function parseDXF(t){
const ls=t.split(/\r?\n/);const bk={};const me=[];let i=0;const N=ls.length;
function np(){if(i>=N-1)return null;const c=parseInt(ls[i].trim());const v=ls[i+1].trim();i+=2;return{c,v}}
function pe(){const e={type:'',layer:'0',x:0,y:0,text:'',bn:'',x2:0,y2:0,r:0,xs:1,ys:1,rot:0,col:256};let p=np();if(!p)return null;e.type=p.v;while(i<N-1){p=np();if(!p)break;if(p.c===0){i-=2;break}switch(p.c){case 8:e.layer=p.v;break;case 10:e.x=parseFloat(p.v);break;case 20:e.y=parseFloat(p.v);break;case 11:e.x2=parseFloat(p.v);break;case 21:e.y2=parseFloat(p.v);break;case 40:e.r=parseFloat(p.v);break;case 1:e.text+=p.v;break;case 3:e.text+=p.v;break;case 2:e.bn=p.v;break;case 41:e.xs=parseFloat(p.v);break;case 42:e.ys=parseFloat(p.v);break;case 50:e.rot=parseFloat(p.v);break;case 62:e.col=parseInt(p.v);break}}return e}
while(i<N){if(ls[i].trim()==='BLOCKS'){i++;break}i++}
let bn=null,be=[];
while(i<N-1){const p=np();if(!p)break;if(p.c===0&&p.v==='ENDSEC')break;if(p.c===0&&p.v==='BLOCK'){be=[];while(i<N-1){const bp=np();if(!bp)break;if(bp.c===2){bn=bp.v;break}if(bp.c===0){i-=2;break}}continue}if(p.c===0&&p.v==='ENDBLK'){if(bn)bk[bn]=be;bn=null;continue}if(p.c===0&&bn){i-=2;const e=pe();if(e&&e.type)be.push(e)}}
i=0;while(i<N){if(ls[i].trim()==='ENTITIES'){i++;break}i++}
while(i<N-1){const p=np();if(!p)break;if(p.c===0&&p.v==='ENDSEC')break;if(p.c===0){i-=2;const e=pe();if(e&&e.type)me.push(e)}}
return{bk,me}}

function cm(r){if(!r)return'';let t=r.replace(/\\P/g,' ').replace(/\^J/g,' ');t=t.replace(/\\[fFCcWwHhAaQqLlOoKkTt][^;]*;/g,'');t=t.replace(/\\p[^;]*;/g,'');t=t.replace(/[{}\\]/g,'');return t.replace(/\s+/g,' ').trim()}

function ext(bk,el,tx=0,ty=0,d=0){
const r=[];if(d>5)return r;
for(const e of el){
if(e.type==='TEXT'||e.type==='MTEXT'){const c=e.type==='MTEXT'?cm(e.text):(e.text||'').trim();if(c)r.push({text:c,x:e.x+tx,y:e.y+ty,layer:e.layer})}
else if(e.type==='INSERT'&&e.bn&&bk[e.bn]){r.push(...ext(bk,bk[e.bn],e.x+tx,e.y+ty,d+1))}}
return r}

function match(ts){const m=[];const u=new Set();for(const t of ts){for(const[kw,nm,ct,kv,h,nt]of DB){const k=Math.round(t.x/50)+'_'+Math.round(t.y/50);if(t.text.includes(kw)&&!u.has(k)){u.add(k);m.push({name:nm,type:ct,kw:kv,height:h,note:nt,x:t.x,y:t.y,src:t.text});break}}}return m}

function render(tab){
const sv=document.getElementById('sv');sv.style.display='block';document.getElementById('emp').style.display='none';
let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;for(const t of AT){if(t.x<x1)x1=t.x;if(t.x>x2)x2=t.x;if(t.y<y1)y1=t.y;if(t.y>y2)y2=t.y}
const p=3000;VB={x:x1-p,y:-(y2+p),w:(x2-x1)+p*2,h:(y2-y1)+p*2};
sv.setAttribute('viewBox',`${VB.x} ${VB.y} ${VB.w} ${VB.h}`);
let h='';const op=tab===0?1:0.25;
h+=`<g opacity="${op}">`;for(const t of AT){h+=`<text x="${t.x}" y="${-t.y}" fill="#aaa" font-size="${t.text.length>20?60:80}" font-family="sans-serif">${t.text.substring(0,30)}</text>`}h+='</g>';
if(tab===0){for(const e of ME){h+=`<g style="cursor:pointer" data-tip="${e.name}${e.kw?' '+e.kw+'kw':''}${e.height?' H:'+e.height:''}"><circle cx="${e.x}" cy="${-e.y}" r="200" fill="rgba(212,146,42,.25)" stroke="#d4922a" stroke-width="8"/><text x="${e.x}" y="${-e.y+60}" fill="#d4922a" font-size="100" text-anchor="middle" font-weight="600" font-family="sans-serif">${e.name.substring(0,5)}</text></g>`}}
if(tab===1){for(const e of ME){if(e.type==='X')continue;const c=e.type==='WP'?'#ED7D31':'#5B9BD5';h+=`<g style="cursor:pointer" data-tip="${e.name}${e.kw?' '+e.kw+'kw':''}|H:${e.height}${e.note?' '+e.note:''}"><circle cx="${e.x}" cy="${-e.y}" r="160" fill="${c}" opacity=".85"/>`;if(e.type==='WP'){h+=`<circle cx="${e.x}" cy="${-e.y}" r="100" fill="none" stroke="#fff" stroke-width="8"/><text x="${e.x}" y="${-e.y+200}" fill="${c}" font-size="110" text-anchor="middle" font-weight="700" font-family="sans-serif">WP</text>`}h+=`<circle cx="${e.x-40}" cy="${-e.y+15}" r="22" fill="#fff"/><circle cx="${e.x+40}" cy="${-e.y+15}" r="22" fill="#fff"/>`;if(e.note&&e.note.includes('랜선')){h+=`<circle cx="${e.x+280}" cy="${-e.y}" r="130" fill="none" stroke="#70AD47" stroke-width="8"/><text x="${e.x+280}" y="${-e.y+40}" fill="#70AD47" font-size="90" text-anchor="middle" font-weight="700" font-family="sans-serif">L</text>`}h+=`<text x="${e.x}" y="${-e.y-220}" fill="${c}" font-size="80" text-anchor="middle" font-family="sans-serif">${e.name}</text><text x="${e.x}" y="${-e.y-140}" fill="#C00000" font-size="65" text-anchor="middle" font-family="sans-serif">${e.kw?e.kw+'kw':'예비'} H:${e.height}</text></g>`}}
sv.innerHTML=h;
const tip=document.getElementById('tip');sv.querySelectorAll('[data-tip]').forEach(g=>{g.addEventListener('mouseenter',e=>{tip.innerHTML=(g.dataset.tip||'').replace(/\|/g,'<br>');tip.style.display='block'});g.addEventListener('mousemove',e=>{tip.style.left=e.clientX+14+'px';tip.style.top=e.clientY+14+'px'});g.addEventListener('mouseleave',()=>tip.style.display='none')})}

function stab(n){CT=n;document.querySelectorAll('.tb').forEach((t,i)=>t.classList.toggle('ac',i===n));if(AT.length)render(n)}

function genDXF(raw,eq){
const ls=raw.split(/\r?\n/);let idx=-1,inE=false;
for(let i=0;i<ls.length;i++){if(ls[i].trim()==='ENTITIES')inE=true;if(inE&&ls[i].trim()==='ENDSEC'){idx=i-1;break}}
if(idx<0)return null;
const nl=[];
function mt(x,y,t,h=80,c=7,ly='0'){nl.push('  0','MTEXT','  5',(Math.random()*65535|0).toString(16),'100','AcDbEntity','  8',ly,'  62',''+c,'100','AcDbMText','  10',''+x,'  20',''+y,'  30','0','  40',''+h,'  1',t)}
function ci(cx,cy,r,c=30,ly='0'){nl.push('  0','CIRCLE','  5',(Math.random()*65535|0).toString(16),'100','AcDbEntity','  8',ly,'  62',''+c,'100','AcDbCircle','  10',''+cx,'  20',''+cy,'  30','0','  40',''+r)}
function ln(x1,y1,x2,y2,c=7,ly='0'){nl.push('  0','LINE','  5',(Math.random()*65535|0).toString(16),'100','AcDbEntity','  8',ly,'  62',''+c,'100','AcDbLine','  10',''+x1,'  20',''+y1,'  30','0','  11',''+x2,'  21',''+y2,'  31','0')}
for(const e of eq){if(e.type==='X')continue;const c=e.type==='WP'?30:5;ci(e.x,e.y,120,c);ci(e.x-35,e.y+15,18,c);ci(e.x+35,e.y+15,18,c);ln(e.x-80,e.y+120,e.x+80,e.y+120,c);if(e.type==='WP'){ci(e.x,e.y,75,c);mt(e.x-50,e.y-150,'WP',80,c)}mt(e.x,e.y+350,`${e.name}${e.kw?' '+e.kw+'kw':''}\\PH: ${e.height}${e.note?' '+e.note:''}`,60,1,'OJ-CH-TEXT');ln(e.x,e.y,e.x,e.y+300,1,'OJ-CH-TEXT');if(e.note&&e.note.includes('랜선')){ci(e.x+250,e.y,100,3);mt(e.x+210,e.y-40,'L',100,3)}}
const lx=20300,ly0=5700;mt(lx,ly0,'SYMBOL',120);mt(lx+1500,ly0,'DESCRIPTION',120);mt(lx+3900,ly0,"Q'TY",120);
const wc=eq.filter(e=>e.type==='WP').length;const lc=eq.filter(e=>e.note&&e.note.includes('랜선')).length;
[['2구 콘센트','2EA'],['2구 방우형 콘센트',wc+'EA'],['4구 콘센트','2EA'],['2구 콘센트 (스텐)','6EA'],['전등(디밍기) 스위치 (스텐)','1EA'],['LAN선',Math.max(lc,4)+'EA'],['집결지','1EA']].forEach(([d,q],j)=>{const y=ly0-400*(j+1);ci(lx+100,y,110,30);mt(lx+700,y+50,d,90);mt(lx+3900,y+50,q,90)});
mt(13000,15500,'* 구조적인 현장 상황에 따라 콘센트 위치를 *\\P유동적으로 적용할 수 있습니다.\\P* 높이 값 참고 사항 *',80,1);
return[...ls.slice(0,idx+1),...nl,...ls.slice(idx+1)].join('\n')}

const dz=document.getElementById('dz'),fi=document.getElementById('fi');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dg')});dz.addEventListener('dragleave',()=>dz.classList.remove('dg'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dg');if(e.dataTransfer.files.length)hf(e.dataTransfer.files[0])});
fi.addEventListener('change',e=>{if(e.target.files.length)hf(e.target.files[0])});

function hf(file){
if(!file.name.endsWith('.dxf')){L('DXF 파일만 지원','er');return}
document.getElementById('lg').innerHTML='';L(`파일: ${file.name} (${(file.size/1024).toFixed(0)}KB)`);
dz.classList.add('ok');dz.querySelector('h3').textContent=file.name;dz.querySelector('p').textContent=`${(file.size/1024).toFixed(0)}KB`;
const rd=new FileReader();rd.onload=e=>{try{
DR=e.target.result;L('DXF 파싱 (블록 재귀 탐색)...');
const{bk,me}=parseDXF(DR);const bc=Object.keys(bk).length;
L(`블록 ${bc}개 파싱`);AT=ext(bk,me);L(`텍스트 ${AT.length}개 추출 (재귀 탐색)`,'ok');
ME=match(AT);const wc=ME.filter(e=>e.type==='WP').length;const nc=ME.filter(e=>e.type==='NOR').length;const lc=ME.filter(e=>e.note&&e.note.includes('랜선')).length;
L(`장비 ${ME.length}종 인식 (WP:${wc} 일반:${nc} LAN:${lc})`,'ok');
document.getElementById('iS').style.display='block';document.getElementById('sT').textContent=AT.length;
document.getElementById('sE').textContent=ME.length+'종';document.getElementById('sW').textContent=wc+'EA';
document.getElementById('sN').textContent=nc+'EA';document.getElementById('sL').textContent=lc+'EA';
document.getElementById('eS').style.display='block';
document.getElementById('eL').innerHTML=ME.map(e=>{const b=e.type==='WP'?'<span class="bg bg-w">WP</span>':e.type==='NOR'?'<span class="bg bg-n">일반</span>':'';const l=e.note&&e.note.includes('랜선')?' <span class="bg bg-l">LAN</span>':'';return`<div class="ei"><span>${e.name}</span><span>${b}${l}${e.kw?' '+e.kw+'kw':''}</span></div>`}).join('');
document.getElementById('gB').disabled=false;render(0);
}catch(err){L('오류: '+err.message,'er');console.error(err)}};
rd.readAsText(file,'euc-kr')}

function gen(){
L('');L('=== 전기도면 생성 ===','inf');
const wc=ME.filter(e=>e.type==='WP').length;const nc=ME.filter(e=>e.type==='NOR').length;const lc=ME.filter(e=>e.note&&e.note.includes('랜선')).length;
L(`WP:${wc} 일반:${nc} LAN:${lc}`);
if(DR){const o=genDXF(DR,ME);if(o){window._DXF=o;L('DXF 생성 완료!','ok');document.getElementById('dB').style.display='block';document.getElementById('jB').style.display='block'}}
stab(1)}

function dlJSON(){const d={project:'더타코부스',ts:new Date().toISOString(),eq:ME,sum:{wp:ME.filter(e=>e.type==='WP').length,nor:ME.filter(e=>e.type==='NOR').length,lan:ME.filter(e=>e.note&&e.note.includes('랜선')).length}};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='설비데이터.json';a.click()}

const vw=document.getElementById('vw'),sv=document.getElementById('sv');
vw.addEventListener('wheel',e=>{e.preventDefault();const s=e.deltaY>0?1.1:0.9;const r=sv.getBoundingClientRect();const mx=(e.clientX-r.left)/r.width,my=(e.clientY-r.top)/r.height;const nw=VB.w*s,nh=VB.h*s;VB.x+=(VB.w-nw)*mx;VB.y+=(VB.h-nh)*my;VB.w=nw;VB.h=nh;sv.setAttribute('viewBox',`${VB.x} ${VB.y} ${VB.w} ${VB.h}`)});
vw.addEventListener('mousedown',e=>{DG=true;DS={x:e.clientX,y:e.clientY}});
vw.addEventListener('mousemove',e=>{if(!DG)return;const r=sv.getBoundingClientRect();VB.x-=(e.clientX-DS.x)/r.width*VB.w;VB.y-=(e.clientY-DS.y)/r.height*VB.h;DS={x:e.clientX,y:e.clientY};sv.setAttribute('viewBox',`${VB.x} ${VB.y} ${VB.w} ${VB.h}`)});
vw.addEventListener('mouseup',()=>DG=false);vw.addEventListener('mouseleave',()=>DG=false);
</script>
