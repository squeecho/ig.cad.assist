<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TacoBooth — 전기도면 자동생성</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#141418;--bg2:#1c1c24;--bg3:#24242e;--tx:#e8e8e8;--tx2:#999;--tx3:#666;--bd:#333;--ac:#d4922a;--ac2:#b07820;--red:#e24b4a;--grn:#5dca7a;--blu:#5b9bd5;--ft:'Pretendard Variable','Pretendard',-apple-system,sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--ft);display:flex;height:100vh;overflow:hidden}
.sb{width:300px;min-width:300px;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto}
.hd{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.up{margin:16px;border:2px dashed var(--bd);border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s}
.up:hover,.up.dg{border-color:var(--ac);background:rgba(212,146,42,.05)}
.up.ok{border-color:var(--grn);border-style:solid}
.up h3{font-size:13px;font-weight:500;margin:4px 0 2px}.up p{font-size:11px;color:var(--tx3)}
.sec{margin:0 16px 10px;background:var(--bg2);border-radius:10px;border:1px solid var(--bd)}
.sec-t{padding:10px 14px;font-size:12px;font-weight:500;color:var(--tx2)}
.sec-b{padding:0 14px 10px}
.sr{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.sr span:first-child{color:var(--tx2)}.sr span:last-child{font-weight:500}
.btn{width:calc(100% - 32px);padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ft);margin:0 16px 8px;transition:all .15s}
.bp{background:var(--ac);color:#fff}.bp:hover{background:var(--ac2)}.bp:disabled{opacity:.4;cursor:not-allowed}
.bdl{background:var(--bg3);color:var(--tx);border:1px solid var(--bd)}.bdl:hover{background:var(--bd)}
.el{max-height:150px;overflow-y:auto}
.ei{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,.04)}
.bg{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600}
.bg-w{background:rgba(237,125,49,.15);color:#ED7D31}.bg-l{background:rgba(112,173,71,.15);color:#70AD47}.bg-n{background:rgba(91,155,213,.15);color:#5B9BD5}
.la{margin:0 16px 16px;background:var(--bg2);border-radius:10px;border:1px solid var(--bd);flex:1;min-height:60px;overflow:hidden;display:flex;flex-direction:column}
.la-t{padding:8px 14px;font-size:12px;font-weight:500;color:var(--tx2)}
.la-c{padding:0 14px 8px;font-size:11px;color:var(--tx3);font-family:'SF Mono',monospace;overflow-y:auto;flex:1;line-height:1.6}
.la-c .ok{color:var(--grn)}.la-c .er{color:var(--red)}.la-c .inf{color:var(--blu)}
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tbs{display:flex;padding:12px 20px 0;gap:4px;border-bottom:1px solid var(--bd)}
.tb{padding:8px 16px;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none}
.tb:hover{color:var(--tx2)}.tb.ac{color:var(--ac);background:var(--bg2);border-color:var(--bd)}
.vw{flex:1;position:relative;overflow:hidden;background:var(--bg2)}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--tx3);gap:8px;font-size:13px}
#fi{display:none}
.loader{margin:16px;text-align:center;padding:20px;color:var(--tx2);font-size:12px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.prog{height:3px;background:var(--bd);border-radius:2px;margin:8px 16px;overflow:hidden}
.prog-bar{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
</style>
</head>
<body>
<div class="sb">
<div class="hd"><div class="logo">TB</div><div><div style="font-size:15px;font-weight:600">TacoBooth 전기도면</div><div style="font-size:11px;color:var(--tx2);margin-top:1px">평면도 DXF → POWER PLAN DXF</div></div></div>
<div id="pyS" class="loader"><div class="spin"></div><br>Python 엔진 로딩 중...<br><span style="font-size:10px;color:var(--tx3)">Pyodide + ezdxf (최초 1회, ~20초)</span></div>
<div class="prog"><div class="prog-bar" id="pB" style="width:0%"></div></div>
<div class="up" id="dz" onclick="document.getElementById('fi').click()" style="display:none"><div style="font-size:28px;opacity:.4;margin-bottom:4px">△</div><h3>배치도 DXF 업로드</h3><p>AutoCAD 2018 DXF</p></div>
<input type="file" id="fi" accept=".dxf">
<div class="sec" id="iS" style="display:none"><div class="sec-t">◎ 파싱 결과</div><div class="sec-b"><div class="sr"><span>텍스트</span><span id="sT">-</span></div><div class="sr"><span>장비 인식</span><span id="sE" style="color:var(--grn)">-</span></div><div class="sr"><span>WP</span><span id="sW" style="color:#ED7D31">-</span></div><div class="sr"><span>일반</span><span id="sN">-</span></div><div class="sr"><span>LAN</span><span id="sL" style="color:#70AD47">-</span></div></div></div>
<div class="sec" id="eS" style="display:none"><div class="sec-t">◎ 인식된 장비</div><div class="sec-b el" id="eL"></div></div>
<button class="btn bp" id="gB" style="display:none" disabled onclick="generate()">▶ 전기도면 생성</button>
<button class="btn bdl" id="dB" style="display:none" onclick="dlDXF()">↓ POWER PLAN DXF 다운로드</button>
<div class="la"><div class="la-t">■ 로그</div><div class="la-c" id="lg">Python 엔진 준비 중...</div></div>
</div>
<div class="mn">
<div class="tbs"><div class="tb ac" onclick="stab(0)">원본</div><div class="tb" onclick="stab(1)">전기</div></div>
<div class="vw" id="vw"><div class="es" id="emp"><div style="font-size:36px;opacity:.2">△</div>DXF 파일을 불러와주세요</div><svg id="sv" style="display:none" xmlns="http://www.w3.org/2000/svg"></svg></div>
</div>
<script>
let py=null,rBytes=null,AT=[],ME=[],CT=0,VB={x:0,y:0,w:1e3,h:800},DG=false,DS={x:0,y:0};
function log(m,c=''){const e=document.getElementById('lg');e.innerHTML+='<div'+(c?' class="'+c+'"':'')+ '>'+m+'</div>';e.scrollTop=e.scrollHeight}
function prog(p){document.getElementById('pB').style.width=p+'%'}

const PY_SRC = `
import ezdxf, re, io, json, base64

def clean_mtext(raw):
    text = raw.replace(chr(92)+'P', ' ').replace('^J', ' ')
    text = re.sub(r'\\\\[fFCcWwHhAaQqLlOoKkTt][^;]*;', '', text)
    text = re.sub(r'\\\\p[^;]*;', '', text)
    text = text.replace('{', '').replace('}', '').replace(chr(92), '')
    return re.sub(r'\\s+', ' ', text).strip()

def extract_texts(doc, bn=None, tr=(0,0), d=0):
    r = []
    ents = doc.blocks.get(bn) if bn else doc.modelspace()
    if ents is None: return r
    for e in ents:
        if e.dxftype() == 'TEXT':
            r.append({"text": e.dxf.text.strip(), "x": e.dxf.insert.x+tr[0], "y": e.dxf.insert.y+tr[1]})
        elif e.dxftype() == 'MTEXT':
            r.append({"text": clean_mtext(e.text), "x": e.dxf.insert.x+tr[0], "y": e.dxf.insert.y+tr[1]})
        elif e.dxftype() == 'INSERT' and d < 5:
            r.extend(extract_texts(doc, e.dxf.name, (e.dxf.insert.x+tr[0], e.dxf.insert.y+tr[1]), d+1))
    return r

EQ_DB = [
    ("음료 쇼케이스","음료쇼케이스","WP",0.5,2000,""),
    ("상부 그리들","가스낮은그리들","WP",0,600,"랜선"),
    ("서랍식냉장고","낮은서랍식냉장고","WP",0.6,600,"랜선"),
    ("슬라이딩 온장고","서랍식온장고","WP",1.5,600,"단독"),
    ("테이블온장고","테이블온장고","WP",0.6,600,""),
    ("토핑냉장고","김밥테이블냉장고","WP",0.4,600,""),
    ("수비드","수비드머신","WP",2.0,600,"단독"),
    ("식세기","식기세척기","WP",3.8,1500,"단독직결"),
    ("3구렌지","3구렌지","WP",0,1200,""),
    ("튀김기","가스튀김기","WP",0.4,600,""),
    ("45BOX","45박스","WP",1.2,2000,""),
    ("쇼케이스","음료쇼케이스","WP",0.5,2000,""),
    ("제빙기","제빙기","WP",1.2,600,"맥주+제빙기"),
    ("그리들","가스그리들","WP",0,600,""),
    ("정수기","정수기","NOR",0,"장내부",""),
    ("온수기장","가스온수기","NOR",0,"높이맞춤",""),
    ("온수기","가스온수기","NOR",0,"높이맞춤",""),
    ("키오스크","키오스크","NOR",0,"장내부","랜선"),
    ("POS","POS","NOR",0,"장내부","랜선"),
    ("충전","충전돼지","NOR",0,1200,""),
]

def match_equipment(texts):
    matched = []
    used = set()
    for t in texts:
        for kw, name, ctype, kwv, h, note in EQ_DB:
            k = (round(t["x"]/50), round(t["y"]/50))
            if kw in t["text"] and k not in used:
                used.add(k)
                matched.append({"name":name,"type":ctype,"kw":kwv,"h":h,"note":note,"x":t["x"],"y":t["y"]})
                break
    return matched

_doc = None
_equip = None

def process_dxf_b64(b64str):
    global _doc, _equip
    raw = base64.b64decode(b64str)
    _doc = ezdxf.read(io.BytesIO(raw))
    texts = extract_texts(_doc)
    _equip = match_equipment(texts)
    return json.dumps({
        "texts":[{"text":t["text"],"x":float(t["x"]),"y":float(t["y"])} for t in texts],
        "equip":[{"name":e["name"],"type":e["type"],"kw":float(e["kw"]),"h":str(e["h"]),"note":e["note"],"x":float(e["x"]),"y":float(e["y"])} for e in _equip]
    })

def generate_power_b64():
    global _doc, _equip
    msp = _doc.modelspace()
    if "OJ-CH-TEXT" not in [l.dxf.name for l in _doc.layers]:
        _doc.layers.add("OJ-CH-TEXT", color=7)
    wp_c = 0
    lan_c = 0
    for eq in _equip:
        if eq["type"] not in ("WP","NOR"): continue
        c = 30 if eq["type"]=="WP" else 5
        x,y = eq["x"],eq["y"]
        msp.add_circle((x,y),120,dxfattribs={"layer":"0","color":c})
        msp.add_circle((x-35,y+15),18,dxfattribs={"layer":"0","color":c})
        msp.add_circle((x+35,y+15),18,dxfattribs={"layer":"0","color":c})
        msp.add_line((x-80,y+120),(x+80,y+120),dxfattribs={"layer":"0","color":c})
        if eq["type"]=="WP":
            msp.add_circle((x,y),75,dxfattribs={"layer":"0","color":c})
            msp.add_mtext("WP",dxfattribs={"layer":"0","char_height":80,"color":c,"insert":(x-50,y-150)})
            wp_c+=1
        if eq["note"] and "랜선" in str(eq["note"]):
            lx=x+250
            msp.add_circle((lx,y),100,dxfattribs={"layer":"0","color":3})
            msp.add_mtext("L",dxfattribs={"layer":"0","char_height":100,"color":3,"insert":(lx-35,y-40)})
            lan_c+=1
    lx2,ly0=20300,5700
    msp.add_text("SYMBOL",dxfattribs={"layer":"0","height":120,"insert":(lx2,ly0)})
    msp.add_text("DESCRIPTION",dxfattribs={"layer":"0","height":120,"insert":(lx2+1500,ly0)})
    msp.add_text("Q'TY",dxfattribs={"layer":"0","height":120,"insert":(lx2+3900,ly0)})
    legend=[("2구 콘센트","2EA"),("2구 방우형 콘센트",f"{wp_c}EA"),("4구 콘센트","2EA"),("2구 콘센트 (스텐)","6EA"),("전등(디밍기) 스위치 (스텐)","1EA"),("LAN선",f"{max(lan_c,4)}EA"),("집결지","1EA")]
    ly=ly0-400
    for desc,qty in legend:
        msp.add_circle((lx2+100,ly),110,dxfattribs={"layer":"0","color":30})
        msp.add_mtext(desc,dxfattribs={"layer":"0","char_height":90,"insert":(lx2+700,ly+50)})
        msp.add_mtext(qty,dxfattribs={"layer":"0","char_height":90,"insert":(lx2+3900,ly+50)})
        ly-=400
    buf=io.BytesIO()
    _doc.saveas(buf)
    return base64.b64encode(buf.getvalue()).decode('ascii'), wp_c, lan_c
`;

async function initPy(){
  try{
    log('Pyodide 로딩 중...');prog(10);
    const script=document.createElement('script');
    script.src='https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js';script.crossOrigin='anonymous';
    script.onload=async()=>{
      try{
        py=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.27.0/full/'});
        prog(40);log('micropip 설치...');
        await py.loadPackage('micropip');prog(55);
        const mp=py.pyimport('micropip');
        log('ezdxf 설치 중 (10~30초)...');
        await mp.install('ezdxf');prog(85);
        log('Python 코드 로딩...');
        await py.runPythonAsync(PY_SRC);prog(100);
        log('준비 완료!','ok');
        document.getElementById('pyS').style.display='none';
        document.getElementById('dz').style.display='block';
        document.getElementById('gB').style.display='block';
      }catch(e){log('초기화 실패: '+e.message,'er');console.error(e)}
    };
    script.onerror=()=>{log('Pyodide CDN 로딩 실패. 네트워크를 확인하세요.','er')};
    document.head.appendChild(script);
  }catch(e){log('로딩 실패: '+e.message,'er');console.error(e)}
}
initPy();

const dz=document.getElementById('dz'),fi=document.getElementById('fi');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dg')});
dz.addEventListener('dragleave',()=>dz.classList.remove('dg'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dg');if(e.dataTransfer.files.length)hFile(e.dataTransfer.files[0])});
fi.addEventListener('change',e=>{if(e.target.files.length)hFile(e.target.files[0])});

function arrayBufToBase64(buf){
  const bytes=new Uint8Array(buf);
  let bin='';
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk){
    bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));
  }
  return btoa(bin);
}

async function hFile(file){
  if(!file.name.endsWith('.dxf')){log('DXF만 지원','er');return}
  document.getElementById('lg').innerHTML='';
  log('파일: '+file.name+' ('+(file.size/1024).toFixed(0)+'KB)');
  dz.classList.add('ok');dz.querySelector('h3').textContent=file.name;dz.querySelector('p').textContent=(file.size/1024).toFixed(0)+'KB';
  
  const ab=await file.arrayBuffer();
  const b64=arrayBufToBase64(ab);
  
  log('ezdxf 파싱 중 (블록 재귀 탐색)...');
  try{
    const resStr=await py.runPythonAsync('process_dxf_b64("'+b64+'")');
    const d=JSON.parse(resStr);
    AT=d.texts;ME=d.equip;
    const wc=ME.filter(e=>e.type==='WP').length;
    const nc=ME.filter(e=>e.type==='NOR').length;
    const lc=ME.filter(e=>e.note&&e.note.includes('랜선')).length;
    log('텍스트 '+AT.length+'개 / 장비 '+ME.length+'종','ok');
    log('WP:'+wc+' 일반:'+nc+' LAN:'+lc);
    document.getElementById('iS').style.display='block';
    document.getElementById('sT').textContent=AT.length;
    document.getElementById('sE').textContent=ME.length+'종';
    document.getElementById('sW').textContent=wc+'EA';
    document.getElementById('sN').textContent=nc+'EA';
    document.getElementById('sL').textContent=lc+'EA';
    document.getElementById('eS').style.display='block';
    document.getElementById('eL').innerHTML=ME.map(function(e){
      var b=e.type==='WP'?'<span class="bg bg-w">WP</span>':e.type==='NOR'?'<span class="bg bg-n">일반</span>':'';
      var l=e.note&&e.note.includes('랜선')?' <span class="bg bg-l">LAN</span>':'';
      return '<div class="ei"><span>'+e.name+'</span><span>'+b+l+(e.kw?' '+e.kw+'kw':'')+'</span></div>';
    }).join('');
    document.getElementById('gB').disabled=false;
    renderSVG(0);
  }catch(e){log('파싱 오류: '+e.message,'er');console.error(e)}
}

async function generate(){
  log('');log('=== 전기도면 DXF 생성 (ezdxf) ===','inf');
  try{
    var resStr=await py.runPythonAsync('_r=generate_power_b64()\njson.dumps({"b64":_r[0],"wp":_r[1],"lan":_r[2]})');
    var res=JSON.parse(resStr);
    var binStr=atob(res.b64);
    var bytes=new Uint8Array(binStr.length);
    for(var i=0;i<binStr.length;i++)bytes[i]=binStr.charCodeAt(i);
    rBytes=bytes;
    log('DXF 생성 완료! WP:'+res.wp+' LAN:'+res.lan,'ok');
    log('파일: '+(rBytes.length/1024).toFixed(0)+'KB');
    document.getElementById('dB').style.display='block';
    stab(1);
  }catch(e){log('생성 오류: '+e.message,'er');console.error(e)}
}

function dlDXF(){
  if(!rBytes)return;
  var b=new Blob([rBytes],{type:'application/octet-stream'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='POWER_PLAN_AUTO.dxf';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  log('DXF 다운로드 완료','ok');
}

function renderSVG(tab){
  var sv=document.getElementById('sv');sv.style.display='block';document.getElementById('emp').style.display='none';
  var x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;
  for(var i=0;i<AT.length;i++){var t=AT[i];if(t.x<x1)x1=t.x;if(t.x>x2)x2=t.x;if(t.y<y1)y1=t.y;if(t.y>y2)y2=t.y}
  var p=3000;VB={x:x1-p,y:-(y2+p),w:(x2-x1)+p*2,h:(y2-y1)+p*2};
  sv.setAttribute('viewBox',VB.x+' '+VB.y+' '+VB.w+' '+VB.h);
  var h='',op=tab===0?1:0.25;
  h+='<g opacity="'+op+'">';
  for(var i=0;i<AT.length;i++){var t=AT[i];h+='<text x="'+t.x+'" y="'+(-t.y)+'" fill="#aaa" font-size="'+(t.text.length>20?60:80)+'" font-family="sans-serif">'+t.text.substring(0,30)+'</text>'}
  h+='</g>';
  if(tab===0){for(var i=0;i<ME.length;i++){var e=ME[i];h+='<circle cx="'+e.x+'" cy="'+(-e.y)+'" r="200" fill="rgba(212,146,42,.25)" stroke="#d4922a" stroke-width="8"/><text x="'+e.x+'" y="'+(-e.y+60)+'" fill="#d4922a" font-size="100" text-anchor="middle" font-weight="600" font-family="sans-serif">'+e.name.substring(0,5)+'</text>'}}
  if(tab===1){for(var i=0;i<ME.length;i++){var e=ME[i];if(e.type!=='WP'&&e.type!=='NOR')continue;var c=e.type==='WP'?'#ED7D31':'#5B9BD5';h+='<circle cx="'+e.x+'" cy="'+(-e.y)+'" r="160" fill="'+c+'" opacity=".85"/>';if(e.type==='WP')h+='<circle cx="'+e.x+'" cy="'+(-e.y)+'" r="100" fill="none" stroke="#fff" stroke-width="8"/><text x="'+e.x+'" y="'+(-e.y+200)+'" fill="'+c+'" font-size="110" text-anchor="middle" font-weight="700" font-family="sans-serif">WP</text>';h+='<circle cx="'+(e.x-40)+'" cy="'+(-e.y+15)+'" r="22" fill="#fff"/><circle cx="'+(e.x+40)+'" cy="'+(-e.y+15)+'" r="22" fill="#fff"/>';if(e.note&&e.note.includes('랜선'))h+='<circle cx="'+(e.x+280)+'" cy="'+(-e.y)+'" r="130" fill="none" stroke="#70AD47" stroke-width="8"/><text x="'+(e.x+280)+'" y="'+(-e.y+40)+'" fill="#70AD47" font-size="90" text-anchor="middle" font-weight="700" font-family="sans-serif">L</text>';h+='<text x="'+e.x+'" y="'+(-e.y-220)+'" fill="'+c+'" font-size="80" text-anchor="middle" font-family="sans-serif">'+e.name+'</text>'}}
  sv.innerHTML=h;
}
