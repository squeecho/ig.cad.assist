<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TacoBooth — 설비도면 자동생성</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#141418;--bg2:#1c1c24;--bg3:#24242e;--text:#e8e8e8;--text2:#999;--text3:#666;--border:#333;--accent:#d4922a;--accent2:#b07820;--red:#e24b4a;--green:#5dca7a;--blue:#5b9bd5;--font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;min-width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.logo-text h2{font-size:15px;font-weight:600}
.logo-text p{font-size:11px;color:var(--text2);margin-top:1px}
.upload-area{margin:16px;border:2px dashed var(--border);border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .2s}
.upload-area:hover,.upload-area.dragover{border-color:var(--accent);background:rgba(212,146,42,.05)}
.upload-area.has-file{border-color:var(--green);border-style:solid}
.upload-icon{font-size:32px;opacity:.4;margin-bottom:8px}
.upload-area h3{font-size:13px;font-weight:500;margin-bottom:4px}
.upload-area p{font-size:11px;color:var(--text3)}
.section{margin:0 16px 12px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.section-title{padding:10px 14px;font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px}
.section-body{padding:0 14px 12px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px}
.stat-row span:first-child{color:var(--text2)}
.stat-row span:last-child{font-weight:500}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.btn-primary{background:var(--accent);color:#fff;margin:0 16px 12px;width:calc(100% - 32px)}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);margin:0 16px 8px;width:calc(100% - 32px)}
.btn-secondary:hover{background:var(--border)}
.log-area{margin:0 16px 16px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);flex:1;min-height:100px;overflow:hidden;display:flex;flex-direction:column}
.log-title{padding:10px 14px;font-size:12px;font-weight:500;color:var(--text2)}
.log-content{padding:0 14px 12px;font-size:11px;color:var(--text3);font-family:'SF Mono','Fira Code',monospace;overflow-y:auto;flex:1;line-height:1.6}
.log-content .success{color:var(--green)}
.log-content .error{color:var(--red)}
.log-content .info{color:var(--blue)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;padding:12px 20px 0;gap:4px;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-radius:8px 8px 0 0;transition:all .15s;border:1px solid transparent;border-bottom:none}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);background:var(--bg2);border-color:var(--border)}
.viewer{flex:1;position:relative;overflow:hidden;background:var(--bg2)}
.viewer svg{width:100%;height:100%}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3)}
.empty-state svg{width:48px;height:48px;opacity:.3;margin-bottom:12px}
.empty-state p{font-size:13px}
.dark-toggle{position:absolute;top:12px;right:16px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text2);cursor:pointer}
#fileInput{display:none}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge-wp{background:rgba(237,125,49,.15);color:#ED7D31}
.badge-lan{background:rgba(112,173,71,.15);color:#70AD47}
.badge-nor{background:rgba(91,155,213,.15);color:#5B9BD5}
.equip-list{max-height:200px;overflow-y:auto}
.equip-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,.05)}
.equip-item:last-child{border:none}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">TB</div>
    <div class="logo-text">
      <h2>TacoBooth 설비도면</h2>
      <p>평면도 DXF → 전기·급배수·조명</p>
    </div>
  </div>

  <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">△</div>
    <h3>DXF 파일을 드래그하거나 클릭</h3>
    <p>배치도 DXF (AutoCAD 2018)</p>
  </div>
  <input type="file" id="fileInput" accept=".dxf">

  <div class="section" id="infoSection" style="display:none">
    <div class="section-title">◎ 프로젝트 정보</div>
    <div class="section-body">
      <div class="stat-row"><span>파일명</span><span id="fileName">-</span></div>
      <div class="stat-row"><span>엔티티</span><span id="entityCount">-</span></div>
      <div class="stat-row"><span>텍스트</span><span id="textCount">-</span></div>
      <div class="stat-row"><span>장비 인식</span><span id="equipCount">-</span></div>
    </div>
  </div>

  <div class="section" id="equipSection" style="display:none">
    <div class="section-title">◎ 인식된 장비</div>
    <div class="section-body equip-list" id="equipList"></div>
  </div>

  <button class="btn btn-primary" id="generateBtn" disabled onclick="generate()">▶ 설비도면 생성</button>
  <button class="btn btn-secondary" id="downloadBtn" style="display:none" onclick="downloadData()">↓ 데이터 다운로드 (JSON)</button>

  <div class="log-area">
    <div class="log-title">■ 로그</div>
    <div class="log-content" id="logContent">파일을 불러오면 시작합니다...</div>
  </div>
</div>

<div class="main">
  <div class="tabs" id="tabBar">
    <div class="tab active" onclick="switchTab('original')">원본</div>
    <div class="tab" onclick="switchTab('power')">전기</div>
    <div class="tab" onclick="switchTab('water')">급배수</div>
    <div class="tab" onclick="switchTab('ceiling')">조명</div>
  </div>
  <div class="viewer" id="viewer">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2z"/><path d="M9 3v18M3 9h18"/></svg>
      <p>DXF 파일을 불러와주세요</p>
    </div>
    <svg id="svgViewer" style="display:none" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="tooltip" style="position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);pointer-events:none;display:none;z-index:100;max-width:220px;line-height:1.5"></div>
</div>

<script>
const EQUIPMENT_DB = [
  ["음료 쇼케이스","음료쇼케이스","WP",0.5,2000,""],
  ["상부 그리들","가스낮은그리들","WP",0,600,"랜선"],
  ["서랍식냉장고","낮은서랍식냉장고","WP",0.6,600,"랜선"],
  ["슬라이딩 온장고","서랍식온장고","WP",1.5,600,"단독"],
  ["테이블온장고","테이블온장고","WP",0.6,600,""],
  ["토핑냉장고","김밥테이블냉장고","WP",0.4,600,""],
  ["수비드","수비드머신","WP",2.0,600,"단독"],
  ["식세기","식기세척기","WP",3.8,1500,"단독직결"],
  ["3구렌지","3구렌지","WP",0,1200,""],
  ["튀김기","가스튀김기","WP",0.4,600,""],
  ["45BOX","45박스","WP",1.2,2000,""],
  ["쇼케이스","음료쇼케이스","WP",0.5,2000,""],
  ["배기후드","배기후드","NONE",0,0,""],
  ["제빙기","제빙기","WP",1.2,600,"맥주기계+제빙기"],
  ["그리들","가스그리들","WP",0,600,""],
  ["워터릴","워터릴","NONE",0,0,""],
  ["퇴식 선반","7단퇴식선반","NONE",0,0,""],
  ["퇴식대장","퇴식대장","NONE",0,0,""],
  ["퇴식대","퇴식작업대","NONE",0,0,""],
  ["정수기","정수기","NOR",0,"장내부",""],
  ["온수기장","가스온수기","NOR",0,"높이맞춤",""],
  ["온수기","가스온수기","NOR",0,"높이맞춤",""],
  ["키오스크","키오스크","NOR",0,"장내부","랜선"],
  ["POS","POS","NOR",0,"장내부","랜선"],
  ["셀프바","셀프바/세면대","NONE",0,0,""],
  ["배달선반","배달선반장","NONE",0,0,""],
  ["충전","충전돼지","NOR",0,1200,""],
  ["카운터","배식대/카운터다이","NONE",0,0,""],
];

const WATER_SPEC = {
  "담금세정대":{c:"15A",h:"15A",d:"50A",dh:400},
  "식기세척기":{c:"-",h:"15A",d:"50A",dh:100,note:"수도끝단 밸브마감"},
  "제빙기":{c:"15A",h:"-",d:"50A"},
  "워터릴":{c:"15A",h:"15A",d:"-",note:"높게설치"},
  "정수기":{c:"15A",h:"-",d:"-"},
  "가스온수기":{c:"15A",h:"-",d:"-",note:"냉/온수 공급원"},
  "셀프바/세면대":{c:"15A",h:"15A",d:"50A"},
};

let parsedData = null;
let matchedEquipment = [];
let currentTab = 'original';
let viewBox = {x:0,y:0,w:1000,h:800};
let isDragging = false;
let dragStart = {x:0,y:0};

// Logging
function log(msg, type='') {
  const el = document.getElementById('logContent');
  const cls = type ? ` class="${type}"` : '';
  el.innerHTML += `<div${cls}>${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// DXF Parser (simplified - handles TEXT, MTEXT, LWPOLYLINE, LINE, CIRCLE, INSERT)
function parseDXF(text) {
  const lines = text.split('\n').map(l => l.trim());
  const entities = [];
  const blocks = {};
  let i = 0;
  
  function readPair() {
    if (i >= lines.length - 1) return null;
    const code = parseInt(lines[i]);
    const value = lines[i + 1];
    i += 2;
    return { code, value };
  }

  // Find ENTITIES section
  while (i < lines.length) {
    if (lines[i] === 'ENTITIES') { i++; break; }
    i++;
  }

  // Parse entities
  let currentEntity = null;
  while (i < lines.length - 1) {
    const pair = readPair();
    if (!pair) break;
    
    if (pair.code === 0) {
      if (currentEntity) entities.push(currentEntity);
      if (pair.value === 'ENDSEC') break;
      currentEntity = { type: pair.value, layer: '0', x: 0, y: 0, points: [] };
    } else if (currentEntity) {
      switch (pair.code) {
        case 8: currentEntity.layer = pair.value; break;
        case 10: currentEntity.x = parseFloat(pair.value); break;
        case 20: currentEntity.y = parseFloat(pair.value); break;
        case 11: currentEntity.x2 = parseFloat(pair.value); break;
        case 21: currentEntity.y2 = parseFloat(pair.value); break;
        case 40: currentEntity.radius = parseFloat(pair.value); break;
        case 1: currentEntity.text = pair.value; break;
        case 3: currentEntity.text = (currentEntity.text||'') + pair.value; break;
        case 2: currentEntity.blockName = pair.value; break;
        case 41: currentEntity.xscale = parseFloat(pair.value); break;
        case 42: currentEntity.yscale = parseFloat(pair.value); break;
        case 50: currentEntity.rotation = parseFloat(pair.value); break;
        case 62: currentEntity.color = parseInt(pair.value); break;
      }
    }
  }
  if (currentEntity) entities.push(currentEntity);
  
  return entities;
}

function cleanMText(raw) {
  if (!raw) return '';
  let t = raw.replace(/\\P/g, ' ').replace(/\^J/g, ' ');
  t = t.replace(/\\[fFCcWwHhAaQqLlOoKkTt][^;]*;/g, '');
  t = t.replace(/\\p[^;]*;/g, '');
  t = t.replace(/[{}\\]/g, '');
  return t.replace(/\s+/g, ' ').trim();
}

function extractTexts(entities) {
  const texts = [];
  for (const e of entities) {
    if (e.type === 'TEXT' || e.type === 'MTEXT') {
      const clean = e.type === 'MTEXT' ? cleanMText(e.text) : (e.text || '');
      if (clean) texts.push({ text: clean, x: e.x, y: e.y, layer: e.layer });
    }
  }
  return texts;
}

function matchEquipment(texts) {
  const matched = [];
  const used = new Set();
  for (const t of texts) {
    for (const [kw, name, ctype, kw_val, h, note] of EQUIPMENT_DB) {
      const key = `${Math.round(t.x/50)}_${Math.round(t.y/50)}`;
      if (t.text.includes(kw) && !used.has(key)) {
        used.add(key);
        matched.push({
          name, type: ctype, kw: kw_val, height: h, note,
          x: t.x, y: t.y, source: t.text,
          water: WATER_SPEC[name] || null
        });
        break;
      }
    }
  }
  return matched;
}

// SVG Renderer
function renderSVG(entities, equipment, tab) {
  const svg = document.getElementById('svgViewer');
  svg.style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  
  // Calculate bounds
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const e of entities) {
    if (e.x !== undefined) { minX = Math.min(minX, e.x); maxX = Math.max(maxX, e.x); }
    if (e.y !== undefined) { minY = Math.min(minY, e.y); maxY = Math.max(maxY, e.y); }
    if (e.x2 !== undefined) { maxX = Math.max(maxX, e.x2); }
    if (e.y2 !== undefined) { maxY = Math.max(maxY, e.y2); }
  }
  const pad = 2000;
  viewBox = { x: minX-pad, y: -(maxY+pad), w: (maxX-minX)+pad*2, h: (maxY-minY)+pad*2 };
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  
  let html = '';
  const bgOpacity = tab === 'original' ? 1 : 0.3;
  
  // Background entities
  html += `<g opacity="${bgOpacity}">`;
  for (const e of entities) {
    switch (e.type) {
      case 'LINE':
        html += `<line x1="${e.x}" y1="${-e.y}" x2="${e.x2}" y2="${-e.y2}" stroke="#888" stroke-width="8" opacity=".5"/>`;
        break;
      case 'LWPOLYLINE':
        break;
      case 'CIRCLE':
        if (e.radius && e.radius < 500)
          html += `<circle cx="${e.x}" cy="${-e.y}" r="${e.radius}" fill="none" stroke="#888" stroke-width="4" opacity=".4"/>`;
        break;
      case 'TEXT':
      case 'MTEXT':
        const clean = e.type === 'MTEXT' ? cleanMText(e.text) : (e.text||'');
        if (clean && clean.length < 40)
          html += `<text x="${e.x}" y="${-e.y}" fill="#aaa" font-size="80" opacity=".5">${clean}</text>`;
        break;
    }
  }
  html += '</g>';
  
  // Equipment markers (original tab)
  if (tab === 'original') {
    for (const eq of equipment) {
      html += `<g class="eq-marker" data-tip="${eq.name}${eq.kw ? ' '+eq.kw+'kw' : ''}${eq.height ? ' H:'+eq.height : ''}">`;
      html += `<circle cx="${eq.x}" cy="${-eq.y}" r="120" fill="rgba(212,146,42,.3)" stroke="#d4922a" stroke-width="6"/>`;
      html += `<text x="${eq.x}" y="${-eq.y+40}" fill="#d4922a" font-size="65" text-anchor="middle" font-weight="600">${eq.name.substring(0,4)}</text>`;
      html += `</g>`;
    }
  }
  
  // Power plan overlay
  if (tab === 'power') {
    for (const eq of equipment) {
      if (eq.type === 'NONE') continue;
      const color = eq.type === 'WP' ? '#ED7D31' : '#5B9BD5';
      const tip = `${eq.name}${eq.kw?' '+eq.kw+'kw':''}\\nH: ${eq.height}${eq.note?' '+eq.note:''}`;
      html += `<g class="eq-marker" data-tip="${tip}">`;
      html += `<circle cx="${eq.x}" cy="${-eq.y}" r="100" fill="${color}" opacity=".9"/>`;
      if (eq.type === 'WP') {
        html += `<circle cx="${eq.x}" cy="${-eq.y}" r="65" fill="none" stroke="#fff" stroke-width="5"/>`;
        html += `<text x="${eq.x}" y="${-eq.y+120}" fill="${color}" font-size="70" text-anchor="middle" font-weight="600">WP</text>`;
      }
      html += `<circle cx="${eq.x-25}" cy="${-eq.y+10}" r="15" fill="#fff"/>`;
      html += `<circle cx="${eq.x+25}" cy="${-eq.y+10}" r="15" fill="#fff"/>`;
      if (eq.note && eq.note.includes('랜선')) {
        html += `<circle cx="${eq.x+180}" cy="${-eq.y}" r="80" fill="none" stroke="#70AD47" stroke-width="6"/>`;
        html += `<text x="${eq.x+180}" y="${-eq.y+25}" fill="#70AD47" font-size="55" text-anchor="middle" font-weight="600">L</text>`;
      }
      html += '</g>';
    }
  }
  
  // Water plan overlay
  if (tab === 'water') {
    for (const eq of equipment) {
      if (!eq.water) continue;
      const w = eq.water;
      const tip = `${eq.name}\\n냉수:${w.c||'-'} 온수:${w.h||'-'} 배수:${w.d||'-'}${w.dh?' H:'+w.dh:''}${w.note?' '+w.note:''}`;
      html += `<g class="eq-marker" data-tip="${tip}">`;
      // Cold water (blue)
      if (w.c && w.c !== '-') {
        html += `<circle cx="${eq.x-80}" cy="${-eq.y}" r="60" fill="#3B8BD4" opacity=".8"/>`;
        html += `<text x="${eq.x-80}" y="${-eq.y+20}" fill="#fff" font-size="40" text-anchor="middle">냉</text>`;
      }
      // Hot water (red)
      if (w.h && w.h !== '-') {
        html += `<circle cx="${eq.x}" cy="${-eq.y}" r="60" fill="#E24B4A" opacity=".8"/>`;
        html += `<text x="${eq.x}" y="${-eq.y+20}" fill="#fff" font-size="40" text-anchor="middle">온</text>`;
      }
      // Drainage (gray)
      if (w.d && w.d !== '-') {
        html += `<circle cx="${eq.x+80}" cy="${-eq.y}" r="60" fill="#666" opacity=".8"/>`;
        html += `<text x="${eq.x+80}" y="${-eq.y+20}" fill="#fff" font-size="40" text-anchor="middle">배</text>`;
      }
      html += `<text x="${eq.x}" y="${-eq.y-100}" fill="#3B8BD4" font-size="60" text-anchor="middle">${eq.name}</text>`;
      html += '</g>';
    }
  }
  
  // Ceiling overlay
  if (tab === 'ceiling') {
    let hoodCount = 0;
    for (const eq of equipment) {
      if (eq.name === '배기후드') {
        hoodCount++;
        html += `<rect x="${eq.x-200}" y="${-eq.y-100}" width="400" height="200" fill="rgba(237,125,49,.2)" stroke="#ED7D31" stroke-width="4" rx="8"/>`;
        html += `<text x="${eq.x}" y="${-eq.y+20}" fill="#ED7D31" font-size="55" text-anchor="middle">후드 ${hoodCount}</text>`;
      }
    }
    html += `<text x="${(minX+maxX)/2}" y="${-(minY+maxY)/2}" fill="#70AD47" font-size="100" text-anchor="middle" opacity=".4">CEILING PLAN</text>`;
    html += `<text x="${(minX+maxX)/2}" y="${-(minY+maxY)/2+150}" fill="#70AD47" font-size="60" text-anchor="middle" opacity=".3">이디아 35EA · 파삼공 11EA · T7 4EA</text>`;
  }
  
  svg.innerHTML = html;
  
  // Tooltip
  const tip = document.getElementById('tooltip');
  svg.querySelectorAll('.eq-marker').forEach(g => {
    g.style.cursor = 'pointer';
    g.addEventListener('mouseenter', e => {
      tip.innerHTML = (g.dataset.tip||'').replace(/\\n/g,'<br>');
      tip.style.display = 'block';
    });
    g.addEventListener('mousemove', e => {
      tip.style.left = e.clientX+14+'px';
      tip.style.top = e.clientY+14+'px';
    });
    g.addEventListener('mouseleave', () => tip.style.display='none');
  });
}

// Tab switching
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['original','power','water','ceiling'][i] === tab);
  });
  if (parsedData) renderSVG(parsedData, matchedEquipment, tab);
}

// File handling
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.name.endsWith('.dxf')) { log('DXF 파일만 지원합니다.', 'error'); return; }
  
  document.getElementById('logContent').innerHTML = '';
  log(`파일 로드: ${file.name} (${(file.size/1024).toFixed(0)}KB)`);
  
  dropZone.classList.add('has-file');
  dropZone.querySelector('h3').textContent = file.name;
  dropZone.querySelector('p').textContent = `${(file.size/1024).toFixed(0)}KB`;
  
  const reader = new FileReader();
  reader.onload = e => {
    try {
      log('DXF 파싱 중...');
      const text = e.target.result;
      parsedData = parseDXF(text);
      log(`엔티티 ${parsedData.length}개 파싱 완료`, 'success');
      
      // Extract texts
      const texts = extractTexts(parsedData);
      log(`텍스트 ${texts.length}개 추출`);
      
      // Match equipment
      matchedEquipment = matchEquipment(texts);
      log(`장비 ${matchedEquipment.length}종 인식`, 'success');
      
      // Update UI
      document.getElementById('infoSection').style.display = 'block';
      document.getElementById('fileName').textContent = file.name.substring(0, 20);
      document.getElementById('entityCount').textContent = parsedData.length;
      document.getElementById('textCount').textContent = texts.length;
      document.getElementById('equipCount').textContent = matchedEquipment.length + '종';
      
      // Equipment list
      document.getElementById('equipSection').style.display = 'block';
      const listEl = document.getElementById('equipList');
      listEl.innerHTML = matchedEquipment.map(eq => {
        const badge = eq.type === 'WP' ? '<span class="badge badge-wp">WP</span>' :
                      eq.type === 'NOR' ? '<span class="badge badge-nor">일반</span>' : '';
        const lan = eq.note && eq.note.includes('랜선') ? ' <span class="badge badge-lan">LAN</span>' : '';
        return `<div class="equip-item"><span>${eq.name}</span><span>${badge}${lan}${eq.kw?' '+eq.kw+'kw':''}</span></div>`;
      }).join('');
      
      document.getElementById('generateBtn').disabled = false;
      
      // Render
      renderSVG(parsedData, matchedEquipment, 'original');
      
    } catch(err) {
      log(`파싱 오류: ${err.message}`, 'error');
    }
  };
  reader.readAsText(file, 'euc-kr');  // Korean DXF encoding
}

// Generate
function generate() {
  log('');
  log('=== 설비도면 생성 시작 ===', 'info');
  
  const wpCount = matchedEquipment.filter(e => e.type === 'WP').length;
  const norCount = matchedEquipment.filter(e => e.type === 'NOR').length;
  const lanCount = matchedEquipment.filter(e => e.note && e.note.includes('랜선')).length;
  const waterCount = matchedEquipment.filter(e => e.water).length;
  
  log(`[전기] WP 콘센트: ${wpCount}EA`);
  log(`[전기] 일반 콘센트: ${norCount}EA`);
  log(`[전기] LAN: ${lanCount}EA`);
  log(`[급배수] 포인트: ${waterCount}개`);
  log(`[조명] 배기후드: ${matchedEquipment.filter(e=>e.name==='배기후드').length}대`);
  log('설비도면 생성 완료!', 'success');
  
  document.getElementById('downloadBtn').style.display = 'block';
  switchTab('power');
}

// Download
function downloadData() {
  const data = {
    project: "더타코부스",
    generated: new Date().toISOString(),
    equipment: matchedEquipment,
    summary: {
      wp: matchedEquipment.filter(e => e.type === 'WP').length,
      normal: matchedEquipment.filter(e => e.type === 'NOR').length,
      lan: matchedEquipment.filter(e => e.note && e.note.includes('랜선')).length,
      water: matchedEquipment.filter(e => e.water).length,
    }
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tacobooth_설비데이터.json';
  a.click();
}

// Pan & Zoom
const viewer = document.getElementById('viewer');
const svgEl = document.getElementById('svgViewer');

viewer.addEventListener('wheel', e => {
  e.preventDefault();
  const scale = e.deltaY > 0 ? 1.1 : 0.9;
  const rect = svgEl.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top) / rect.height;
  
  const newW = viewBox.w * scale;
  const newH = viewBox.h * scale;
  viewBox.x += (viewBox.w - newW) * mx;
  viewBox.y += (viewBox.h - newH) * my;
  viewBox.w = newW;
  viewBox.h = newH;
  svgEl.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
});

viewer.addEventListener('mousedown', e => { isDragging = true; dragStart = {x: e.clientX, y: e.clientY}; });
viewer.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const rect = svgEl.getBoundingClientRect();
  const dx = (e.clientX - dragStart.x) / rect.width * viewBox.w;
  const dy = (e.clientY - dragStart.y) / rect.height * viewBox.h;
  viewBox.x -= dx;
  viewBox.y -= dy;
  dragStart = {x: e.clientX, y: e.clientY};
  svgEl.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
});
viewer.addEventListener('mouseup', () => isDragging = false);
viewer.addEventListener('mouseleave', () => isDragging = false);
</script>
